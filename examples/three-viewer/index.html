<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wasm Box3D</title>
  </head>
  <body>
    <main id="app">
      <canvas id="scene"></canvas>
      <section class="toolbar" aria-label="Simulation controls">
        <div class="brand">
          <span>Box3D WASM</span>
          <strong id="body-count">0 bodies</strong>
        </div>
        <div class="controls">
          <button id="scene-stack" type="button">Stack</button>
          <button id="scene-spheres" type="button">Spheres</button>
          <button id="scene-mixed" type="button">Mixed</button>
          <button id="start-stress" type="button">Stress</button>
          <button id="stop-stress" type="button" disabled>Stop</button>
          <button id="spawn-box" type="button">Box</button>
          <button id="spawn-sphere" type="button">Sphere</button>
          <button id="toggle-pause" type="button">Pause</button>
          <label>
            <input id="gravity" type="checkbox" checked />
            Gravity
          </label>
        </div>
      </section>
      <aside class="readout" aria-label="Simulation status">
        <span id="step-count">step 0</span>
        <span id="fps-readout">0 fps</span>
        <span id="physics-fps-readout">phys 0 fps</span>
        <span id="profile-readout">profile warming</span>
        <span id="stress-status">stress idle</span>
        <span id="wasm-status">loading wasm</span>
      </aside>
      <section class="tuning-panel" aria-label="Physics tuning">
        <div class="tuning-header">
          <div>
            <span>Physics tuning</span>
            <strong id="tuning-status">defaults</strong>
          </div>
          <output id="tuning-substeps-value">4</output>
        </div>
        <label class="range-control">
          Substeps
          <input id="tuning-substeps" type="range" min="1" max="16" step="1" value="4" />
        </label>
        <div class="tuning-grid">
          <label>
            Layout
            <select id="tuning-layout">
              <option value="dense">Dense</option>
              <option value="wide">Wide</option>
              <option value="islands">Islands</option>
            </select>
          </label>
          <label>
            Sleep
            <select id="tuning-sleep">
              <option value="normal">Normal</option>
              <option value="aggressive">Aggressive</option>
              <option value="disabled">Disabled</option>
            </select>
          </label>
          <label>
            Workers
            <input id="tuning-workers" type="number" min="0" max="32" step="1" />
          </label>
          <label>
            Contact Hz
            <input id="tuning-contact-hertz" type="number" min="1" max="240" step="1" />
          </label>
          <label>
            Damping
            <input id="tuning-contact-damping" type="number" min="0.1" max="40" step="0.1" />
          </label>
          <label>
            Speed
            <input id="tuning-contact-speed" type="number" min="0.1" max="40" step="0.1" />
          </label>
        </div>
        <div class="tuning-toggles">
          <label>
            <input id="tuning-continuous" type="checkbox" checked />
            Continuous
          </label>
          <label>
            <input id="tuning-force-sleep" type="checkbox" checked />
            Force sleep
          </label>
        </div>
        <div class="tuning-actions">
          <button id="tuning-apply" type="button">Apply</button>
          <button id="tuning-reset" type="button">Reset</button>
          <button id="tuning-url" type="button">URL</button>
        </div>
      </section>
      <section class="lab-panel" aria-label="Benchmark lab">
        <div class="lab-header">
          <div>
            <span>Benchmark Lab</span>
            <strong id="lab-engine">box3d</strong>
          </div>
          <div class="lab-status" id="lab-status">idle</div>
        </div>
        <div class="lab-row">
          <label for="lab-scenario">Scenario</label>
          <select id="lab-scenario">
            <option value="pileDrop">Pile drop</option>
            <option value="pileSmash">Pile smash</option>
            <option value="lineSpawn">Line spawn</option>
            <option value="dominoSpiral">Domino spiral</option>
            <option value="multiSpiral">Multi spiral</option>
          </select>
        </div>
        <div class="lab-grid">
          <label>
            Duration ms
            <input id="lab-duration" type="number" min="1000" step="500" />
          </label>
          <label>
            Interval ms
            <input id="lab-interval" type="number" min="16" step="16" />
          </label>
          <label>
            Total bodies
            <input id="lab-count" type="number" min="1" step="1" />
          </label>
          <label>
            Batch size
            <input id="lab-batch" type="number" min="1" step="1" />
          </label>
          <label>
            Rows
            <input id="lab-rows" type="number" min="1" step="1" />
          </label>
          <label>
            Line width
            <input id="lab-line-width" type="number" min="0" step="1" />
          </label>
          <label>
            Spacing
            <input id="lab-spacing" type="number" min="0.1" step="0.1" />
          </label>
        </div>
        <div class="lab-actions">
          <button id="lab-run" type="button">Run</button>
          <button id="lab-stop" type="button" disabled>Stop</button>
          <button id="lab-apply" type="button">Apply</button>
          <button id="lab-download" type="button" disabled>JSON</button>
        </div>
        <textarea id="lab-json" spellcheck="false"></textarea>
        <svg id="lab-chart" viewBox="0 0 340 140" role="img" aria-label="Benchmark lab live chart">
          <line class="lab-axis" x1="34" y1="110" x2="326" y2="110"></line>
          <line class="lab-axis" x1="34" y1="14" x2="34" y2="110"></line>
          <text x="34" y="128">time</text>
          <text x="2" y="18">fps</text>
          <path id="lab-render-path" class="lab-render-path"></path>
          <path id="lab-sim-path" class="lab-sim-path"></path>
        </svg>
        <div class="lab-legend">
          <span><i class="lab-render-key"></i>render FPS</span>
          <span><i class="lab-sim-key"></i>sim capacity</span>
          <span id="lab-last-sample">no samples</span>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
