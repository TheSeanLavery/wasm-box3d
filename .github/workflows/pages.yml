name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.1
      - run: npm ci
      - run: VITE_BASE_PATH=/wasm-box3d/ npm run build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: examples/three-viewer/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
